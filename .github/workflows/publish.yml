name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  deployments: write
  id-token: write
  actions: write

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/cli-mon-showdown/
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone Pokemon Showdown
        run: |
          git clone https://github.com/smogon/pokemon-showdown.git
          cd pokemon-showdown
          echo "Installing Pokemon Showdown dependencies..."
          npm ci
          echo "Building Pokemon Showdown..."
          node build
          cd ..
          # Create minimal Pokemon Showdown structure with essential files
          mkdir -p src/cli_mon_showdown/pokemon-showdown
          # Copy built files and essential directories
          cp pokemon-showdown/pokemon-showdown src/cli_mon_showdown/pokemon-showdown/
          cp pokemon-showdown/package.json src/cli_mon_showdown/pokemon-showdown/
          cp pokemon-showdown/build src/cli_mon_showdown/pokemon-showdown/
          cp -r pokemon-showdown/dist src/cli_mon_showdown/pokemon-showdown/
          cp -r pokemon-showdown/data src/cli_mon_showdown/pokemon-showdown/
          cp -r pokemon-showdown/lib src/cli_mon_showdown/pokemon-showdown/
          # Copy node_modules for runtime dependencies (excluding dev dependencies)
          mkdir -p src/cli_mon_showdown/pokemon-showdown/node_modules
          cp -r pokemon-showdown/node_modules/* src/cli_mon_showdown/pokemon-showdown/node_modules/ || echo "Some node_modules may have failed to copy"
          # Skip large unnecessary directories: server, test, tools, translations, config, logs
          echo "Pokemon Showdown built and essentials copied to package directory"
          du -sh src/cli_mon_showdown/pokemon-showdown/
          ls -la src/cli_mon_showdown/pokemon-showdown/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          echo "Setuptools version:"
          python -c "import setuptools; print(setuptools.__version__)"

      - name: Build package
        run: |
          python -m build
          echo "Generated files:"
          ls -la dist/

      - name: Check distribution
        run: |
          python -m twine check dist/*

      - name: Test installation
        run: |
          pip install dist/*.whl
          echo "=== Testing CLI help ==="
          cli-mon --help
          echo "=== Testing Pokemon Showdown integration ==="
          # Install Node.js for Pokemon Showdown
          curl -fsSL https://deb.nodesource.com/setup_18.x | sudo -E bash -
          sudo apt-get install -y nodejs
          echo "Node.js version: $(node --version)"
          echo "=== Testing random battle generation ==="
          timeout 30s cli-mon --randbat --no-p2-ai --debug || echo "Random battle test completed (timeout expected)"

      - name: Create deployment
        uses: chrnorm/deployment-action@v2
        id: deployment
        with:
          token: '${{ github.token }}'
          environment-url: https://pypi.org/project/cli-mon-showdown/
          environment: pypi

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.8.14
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          verbose: true
          skip-existing: true

      - name: Update deployment status (success)
        if: success()
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          environment-url: https://pypi.org/project/cli-mon-showdown/
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}
          state: 'success'

      - name: Update deployment status (failure)
        if: failure()
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          environment-url: https://pypi.org/project/cli-mon-showdown/
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}
          state: 'failure'
