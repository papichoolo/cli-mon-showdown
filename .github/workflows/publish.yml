name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  deployments: write
  id-token: write
  actions: write

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/cli-mon-showdown/
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone Pokemon Showdown
        run: |
          git clone https://github.com/smogon/pokemon-showdown.git
          cd pokemon-showdown
          echo "Installing Pokemon Showdown dependencies..."
          npm ci
          echo "Building Pokemon Showdown..."
          node build
          cd ..
          # Copy ALL Pokemon Showdown files (excluding platform-specific node_modules and dev files)
          mkdir -p src/cli_mon_showdown/pokemon-showdown
          echo "Copying all Pokemon Showdown files to package directory..."
          cp -r pokemon-showdown/* src/cli_mon_showdown/pokemon-showdown/ 2>/dev/null || true
          # Remove platform-specific node_modules to avoid esbuild platform conflicts
          rm -rf src/cli_mon_showdown/pokemon-showdown/node_modules 2>/dev/null || true
          # Remove .git directory if it was copied
          rm -rf src/cli_mon_showdown/pokemon-showdown/.git 2>/dev/null || true
          # Remove some large development files that aren't needed for runtime
          rm -rf src/cli_mon_showdown/pokemon-showdown/.github 2>/dev/null || true
          rm -rf src/cli_mon_showdown/pokemon-showdown/test 2>/dev/null || true
          # Keep package.json for users to install dependencies locally
          echo "Pokemon Showdown files copied (excluding platform-specific node_modules)"
          du -sh src/cli_mon_showdown/pokemon-showdown/
          echo "Directory structure:"
          find src/cli_mon_showdown/pokemon-showdown/ -maxdepth 2 -type d | head -20

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          echo "Setuptools version:"
          python -c "import setuptools; print(setuptools.__version__)"

      - name: Build package
        run: |
          python -m build
          echo "Generated files:"
          ls -la dist/

      - name: Check distribution
        run: |
          python -m twine check dist/*

      - name: Test installation
        run: |
          pip install dist/*.whl
          echo "=== Testing CLI help ==="
          cli-mon --help
          echo "=== Testing Pokemon Showdown integration ==="
          # Install Node.js for Pokemon Showdown
          curl -fsSL https://deb.nodesource.com/setup_18.x | sudo -E bash -
          sudo apt-get install -y nodejs
          echo "Node.js version: $(node --version)"
          echo "=== Testing random battle generation ==="
          timeout 30s cli-mon --randbat --no-p2-ai --debug || echo "Random battle test completed (timeout expected)"

      - name: Create deployment
        uses: chrnorm/deployment-action@v2
        id: deployment
        with:
          token: '${{ github.token }}'
          environment-url: https://pypi.org/project/cli-mon-showdown/
          environment: pypi

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.8.14
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          verbose: true
          skip-existing: true

      - name: Update deployment status (success)
        if: success()
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          environment-url: https://pypi.org/project/cli-mon-showdown/
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}
          state: 'success'

      - name: Update deployment status (failure)
        if: failure()
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          environment-url: https://pypi.org/project/cli-mon-showdown/
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}
          state: 'failure'
